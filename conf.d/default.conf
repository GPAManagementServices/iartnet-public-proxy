# ==========================================
# Docker DNS / WebSocket support
# ==========================================
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ==========================================
# HTTP CATCH-ALL & ACME CHALLENGE (Porta 80)
# ==========================================
server {
    listen 80;
    server_name iartnet.gpams.it iiif.gpams.it ingestion.gpams.it cms.gpams.it;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================
# FRONTEND NUXT (iartnet.gpams.it)
# ==========================================
server {
    listen 443 ssl;
    server_name iartnet.gpams.it;

    ssl_certificate /etc/letsencrypt/live/iartnet.gpams.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iartnet.gpams.it/privkey.pem;

    resolver 127.0.0.11 ipv6=off valid=10s;
    set $frontend_upstream iartnet_frontend:3000;

    location / {
        proxy_pass http://$frontend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}

# ==========================================
# API LARAVEL (ingestion.gpams.it)
# ==========================================
server {
    listen 443 ssl;
    server_name ingestion.gpams.it;

    ssl_certificate /etc/letsencrypt/live/iartnet.gpams.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iartnet.gpams.it/privkey.pem;

    client_max_body_size 1G;

    resolver 127.0.0.11 ipv6=off valid=10s;
    set $api_upstream iartnet_api_nginx:80;

    location / {
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        proxy_pass http://$api_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}

# ==========================================
# CMS FILAMENT (cms.gpams.it)
# ==========================================
server {
    listen 443 ssl;
    server_name cms.gpams.it;

    ssl_certificate /etc/letsencrypt/live/iartnet.gpams.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iartnet.gpams.it/privkey.pem;

    client_max_body_size 100M;

    resolver 127.0.0.11 ipv6=off valid=10s;
    set $cms_upstream iartnetcms_nginx:80;

    location ^~ /storage/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Accept-Ranges' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Accept-Ranges' always;

        proxy_pass http://$cms_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location / {
        proxy_pass http://$cms_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}

# ==========================================
# SERVER IIIF (iiif.gpams.it)
# ==========================================
server {
    listen 443 ssl;
    server_name iiif.gpams.it;

    ssl_certificate /etc/letsencrypt/live/iartnet.gpams.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iartnet.gpams.it/privkey.pem;

    resolver 127.0.0.11 ipv6=off valid=10s;
    set $iiif_upstream iartnet_iiif:8182;

    location / {
        # Evita duplicazione degli header CORS già emessi da Cantaloupe/IIIF
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        # CORS gestito centralmente dal reverse proxy
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Accept-Ranges' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Accept-Ranges' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }

        proxy_pass http://$iiif_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

}
