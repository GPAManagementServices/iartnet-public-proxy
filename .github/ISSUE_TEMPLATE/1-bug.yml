name: Bug report
description: Segnala pubblicamente un errore riproducibile che non riguarda la sicurezza
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Grazie per la segnalazione.

        **Non usare questo modulo per vulnerabilità di sicurezza.**
        Per una segnalazione privata usa:
        https://github.com/GPAManagementServices/iartnet-public-proxy/security/advisories/new

        Non inserire password, token, dati personali, dump di database,
        exploit o altre informazioni riservate.

  - type: checkboxes
    id: security-confirmation
    attributes:
      label: Conferma relativa alla sicurezza
      description: |
        Le vulnerabilità devono essere comunicate esclusivamente tramite
        il canale privato indicato sopra.
      options:
        - label: "Confermo che questa segnalazione non riguarda una vulnerabilità di sicurezza e non contiene credenziali, dati riservati o dettagli di exploit."
          required: true

  - type: input
    id: version
    attributes:
      label: Versione, tag o commit
      placeholder: "Esempio: main, v1.2.3 oppure abc1234"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Descrizione del problema
      description: Descrivi in modo chiaro il comportamento osservato.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Passaggi per riprodurre
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamento atteso
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamento effettivo
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Contesto aggiuntivo
      description: |
        Puoi aggiungere log non sensibili, screenshot o altre informazioni utili.
        Rimuovi sempre credenziali, token, dati personali e informazioni riservate.
    validations:
      required: false

  - type: checkboxes
    id: preliminary-checks
    attributes:
      label: Verifiche preliminari
      options:
        - label: "Ho verificato che non esista già una segnalazione equivalente."
          required: true
        - label: "Ho rimosso password, token, dati personali e informazioni riservate."
          required: true