# PROD preview protection.
#
# Public traffic is protected with BasicAuth.
# Internal Docker traffic is allowed so Nuxt/Nitro SSR can call
# CMS and Ingestion through their public PROD hostnames without BasicAuth.
satisfy any;

# Local/container-originated traffic.
allow 127.0.0.1;
allow ::1;

# Docker bridge networks usually live in 172.16.0.0/12.
# Current PROD networks include 172.18.x, 172.19.x and 172.20.x.
allow 172.16.0.0/12;

deny all;

auth_basic "IARTNET preview";
auth_basic_user_file /etc/nginx/.htpasswd;
